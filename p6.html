<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .calculator {
            width: 300px;
            padding: 20px;
            border-radius: 8px;
            background-color: orange;
        }

        #display {
            width: 100%;
            height: 40px;
            box-sizing: border-box;
            text-align: right;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            cursor: pointer;
            padding: 10px;
            background-color: yellow;
            border-radius: 4px;
            font-size: 1.2em;
            border: none;
        }
        .button:hover{
            background-color:#ddd;
        }

        .operator {
            background-color: yellow;
            color:black;
        }

        .operator:hover {
            background-color: #e09020;
        }
    </style>
</head>

<body>
<div class="calculator">
    <input type="text" id="display" readonly>
<div class="buttons">
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="setOperation('+')">&plus;</button>

        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="setOperation('-')">&minus;</button>

        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="operator" onclick="setOperation('*')">&times;</button>

        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button class="operator" onclick="calculate()">&equals;</button>
       
        <button class="operator" onclick="setOperation('/')">&divide;</button>
         <button class="operator" onclick="setOperation('%')">%</button>
        <button class="operator" onclick="setOperation('^')">x<sup>y</sup></button>
        <button class="operator" onclick="squareRoot()">√</button>
        <button class="operator" onclick="square()">x<sup>2</sup></button>

        <button onclick="clearDisplay()">C</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");
    let currentValue = "";
    let previousValue = "";
    let operation = "";

    function appendToDisplay(value) {
        currentValue += value;
        display.value = currentValue;
    }

    function clearDisplay() {
        currentValue = "";
        previousValue = "";
        operation = "";
        display.value = "";
    }

    function setOperation(op) {
        if (currentValue == "") ;

        if (previousValue !== "") {
            calculate();
        }

        operation = op;
        previousValue = currentValue;
        currentValue = "";
    }

    function calculate() {
        if (previousValue == "" && currentValue == "") {

        const prev = parseFloat(previousValue);
        const current = parseFloat(currentValue);
        let result;

        switch (operation) {
            case "+":
                result = prev + current;
                break;
            case "-":
                result = prev - current;
                break;
            case "*":
                result = prev * current;
                break;
            case "/":
                result = prev / current;
                break;
            case "%":
                result = prev % current;
                break;
            case "^":
                result = Math.pow(prev, current);
                break;
            
        }
    }

        display.value = result;
        previousValue = result.toString();
        currentValue = "";
        operation = "";
    }

    function squareRoot() {
        if (currentValue !== "") {
        let result = Math.sqrt(parseFloat(currentValue));
        display.value = result;
        currentValue = result.toString();
    }
}

</script>

</body>
</html>
