<!DOCTYPE html>
<html>
<head>
    <title>spoorti</title>       
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
        }
        .box { 
            border: 1px solid #ccc; 
            padding: 15px; 
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 60px; 
            margin: 10px 0; 
        }
        .result { 
            color: green; 
            white-space: pre-wrap; 
            margin-top: 10px; 
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>JavaScript JSON & Crypto Tasks</h1>
    <div class="box">
        <h3>a) JSON Text to Object</h3>
        <textarea id="inputA">{"id": 101, "name": "spoorti" , "age": 21}</textarea>
        <button onclick="taskA()">Convert</button>
        <div id="resA" class="result"></div>
    </div>
    <div class="box">
        <h3>b) JSON to Date Object</h3>
        <textarea id="inputB">{"event": "Meeting", "date": "2025-12-13"}</textarea>
        <button onclick="taskB()">Convert</button>
        <div id="resB" class="result"></div>
    </div>
    <div class="box">
        <h3>c) JSON to CSV / CSV to JSON</h3>
        <textarea id="inputC">[{"name":"spoorti","age":21},{"name":"spooti","age":20}]</textarea>
        <br>
        <button onclick="jsonToCsv()">JSON to CSV</button>
        <button onclick="csvToJson()">CSV to JSON</button>
        <div id="resC" class="result"></div>
    </div>
    <div class="box">
        <h3>d) Create Hash (SHA-256)</h3>
        <input type="text" id="inputD" value="Hello World">
        <button onclick="taskD()">Generate Hash</button>
        <div id="resD" class="result"></div>
    </div>
    <script>
        function taskA() {
            var input = document.getElementById("inputA").value;
            try {
                var obj = JSON.parse(input);
                document.getElementById("resA").innerText = "Object Name: " + obj.name + "\nAge: " + obj.age + "\nID: " + obj.id;
            } catch (err) {
                document.getElementById("resA").innerText = "Invalid JSON";
            }
        }
        function taskB() {
            var input = document.getElementById("inputB").value;
            try {
                var obj = JSON.parse(input, function (key, value) {
                    if (key === "date") {
                        return new Date(value);
                    }
                    return value;
                });
                document.getElementById("resB").innerText = "Is Date Object: " + (obj.date instanceof Date) + "\nDate: " + obj.date;
            } catch (e) {
                document.getElementById("resB").innerText = "Invalid JSON";
            }
        }
        function jsonToCsv() {
            var json = document.getElementById("inputC").value;
            try {
                var arr = JSON.parse(json);
                if (!Array.isArray(arr)) arr = [arr]; 
                var headers = Object.keys(arr[0]).join(",");
                var rows = arr.map(obj => Object.values(obj).join(",")).join("\n");
                var csv = headers + "\n" + rows;
                document.getElementById("resC").innerText = csv;
            } catch(e) {
                document.getElementById("resC").innerText = "Error parsing JSON";
            }
        }
        function csvToJson() {
            var csvData = document.getElementById("resC").innerText;
            if(!csvData) {
                document.getElementById("resC").innerText = "No CSV data found in result box. Convert JSON to CSV first.";
                return;
            }
            var lines = csvData.trim().split("\n");
            var result = [];
            var headers = lines[0].split(",");
            for (var i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                var obj = {};
                var currentline = lines[i].split(",");
                for (var j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentline[j];
                }
                result.push(obj);
            }
            document.getElementById("resC").innerText = JSON.stringify(result, null, 4);
        }
        async function taskD() {
            var text = document.getElementById("inputD").value;
            if (!text) return;
            const msgBuffer = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            document.getElementById("resD").innerText = hashHex;
        }
    </script>
</body>
</html>
