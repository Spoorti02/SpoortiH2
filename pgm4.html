<html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" >html<meta name="viewport" content="width=device-width,intial-scale=1.0">
        <title>Registration form</title>
        <style>
            body{
                font-family:Arial,sans-serif;
                background-color:white;
                padding:20px;
                margin:0 auto;
            }
            h1{
                color:navy;
                text-align:center;
            }
            table{
                width:100%;
                margin:0 auto;
                max-width:600px;
                border:1px solid black;
                padding:20px;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);

            }
            td{
                padding:10px;
            }
            table{
                font-size:16px;
                color:black;
            }
            input[type="text"],input[type="email"],input[type="password"],select,textarea{
                padding:10px;
                color:black;
                width:100%;
                font-size:14px;

            }
            input[type="radio"],input[type="checkbox"]{
                margin-right:5px;
            }
            input[type="submit"]{
                color:white;
                background-color:green;
                cursor:pointer;
                font-size:24px;
            }
            input[type="submit"].hover{
                background-color:green;
            }
            .error{
                color:red;
                font-size:14px;
            }
            </style>
            </head>
            <body>
                <h1>Registration form</h1>
                <form action="#" method="post">
                    <table>
                        <tr>
                            <td><label for="full name">Full Name:</label></td>
                            <td><input type="text" id="full name" name="full name"required></td>
                        </tr>
                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td><input type="email" id="email" name="email"required></td>
                        </tr>
                        <tr>
                            <td><label for="password">Password:</label></td>
                            <td><input type="password" id="password" name="password"required></td>
                        </tr>
                        <tr>
                            <td><label for="password">Confirm Password:</label></td>
                            <td><input type="password" id="Confirm password" name="Confirm password"required></td>
                        </tr>
                        <tr>
                            <td><label for="Gender">Gender:</label></td>
                            <td><input type="radio" id="male" name="gender" value="male"required>
                            <label for="male">Male</label>
                            
                            <input type="radio" id="female" name="gender" value="female"required>
                            <label for="female">Female</label>

                            <input type="radio" id="other" name="gender" value="other"required>
                            <label for="other">Other</label>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="date of birth">Date of Birth:</label></td>
                            <td><input type="date" id="date of birth" name="date of birth"required></td>
                        </tr>
                        <tr>
                            <td><label for="country">Country:</label></td>
                             <td>
                                <select id ="country" name="country "required>
                                <option value="">select a country</option>
                                <option value="usa">India</option>
                                <option value="uk">United Kingdom</option>
                                <option value="canada">Canada</option>
                                <option value="Africa">Africa</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                        <td><label for="intrests">Intrests:</label></td>
                            <td>
                                
                            <input type="checkbox" id="sports" name="intrests[]" value="sports">
                            <label for="sports">Sports</label>

                            <input type="checkbox" id="music" name="intrests[]" value="music">
                            <label for="music">Music</label>

                            <input type="checkbox" id="reading" name="intrests[]" value="reading">
                            <label for="reading">Reading</label>

                            <input type="checkbox" id="travel" name="intrests[]" value="travel">
                            <label for="travel">Travel</label>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="bio">Bio:</td></label>
                            <td><textarea id="bio" name="bio" rows="4"></textarea></td>
                        </tr>
                        <tr>
                            <td colspan="2" style="text-align:center;">                       
                                <input type="submit" value="Register">
                                </td>
                                </tr>
                                </table>
                                </form>
                                </body>
                                </html>
