<html>
<html lang="en">
    <head>
        <meta charset="UTF-8"><meta name="viewport"content="width=device-width,intial-scale=1.0">
        <title> Simple Calucator</title>
        <style>
            body{
                font-family:Arial,sans-serif;
                height:100rh;
                background-color:white;
                justify-content:center;
                align-items:center;
                display:flex;
                margin:0;
            }
            .calculator{
                width:300px;
                padding:20px;
                border-radius:8px;
                background-color:orange;
                
                

            }
            #display{
                width:100%;
                height:40px;
                box-sizing: border-box;
                text-align:right;
                font-size:1.5em;
            }
            .buttons{
                display:grid;
                
                gap:10px;
            }
            button{
                cursor: pointer;
                padding:10px;
                background-color:yellow;
                border-radius: 4px;
                font-size:1.2em;
            }
            button.hover{
                background-color:#d0d0d0;
            }
            .opertor{
                background-color:orange;
                color:white;
            }
            .operator:hover{
                background-color:#e09020;
            }
            
            </style>
            </head>
            <body>
                <div class="calculator">
                    <input type="text"id="display"readonly>
                <div class="buttons">
                    <button onclick="appendtoDisplay('7')">7</button>
                    <button onclick="appendtoDisplay('8')">8</button>
                    <button onclick="appendtoDisplay('9')">9</button>
                    <button class="operator" onclick =" Setoperation('+')">&plus;</button>

                    <button onclick="appendtoDisplay('4')">4</button>
                    <button onclick="appendtoDisplay('5')">5</button>
                    <button onclick="appendtoDisplay('6')">6</button>
                    <button class="operator" onclick =" Setoperation('-')">&minus;</button>

                     <button onclick="appendtoDisplay('1')">1</button>
                     <button onclick="appendtoDisplay('2')">2</button>
                     <button onclick="appendtoDisplay('3')">3</button>
                     <button class="operator" onclick =" Setoperation('*')">&times;</button>

                     <button onclick="appendtoDisplay('0')">0</button>
                     <button onclick="appendtoDisplay('.')">.</button>
                     <button class="operator" onclick =" calucator()">&equals;</button>

                      <button class="operator" onclick =" Setoperation('%')">%</button>
                      <button class="operator" onclick =" Setoperation('/')">&divide;</button>
                      <button class="operator" onclick ="Setoperation('^')">x<sup>y</sup></button>
                       <button class="operator"onclick="SquareRoot()">√</button> 
                       <button class="operator"onclick="Square()">x<sup>2</sup> </button>
                       <button onclick="clearDisplay()">c</button>
                </div>
                <div>
                    <script>
                    let display=document.getElementById('display');
                    let currentValue='';
                    let operation='';
                    let previousValue='';
                    
                    function appendtoDisplay(value){
                        currentValue+=value;
                        display.value=currentValue;
                    }
                    function clearDisplay(){
                        opertion='';
                        currentValue='';
                        previousValue='';
                        display.value='';
                    }
                    function Setoperation(op){
                        if(currentValue ==''){}
                        if(previousValue !==''){
                            calculate();
                        }
                        operation=op;
                        previousValue=currentValue;
                        currentValue='';
                        }
                     
                     function calculate(){
                        if(previousValue !=='' && currentValue !==''){
                            let result;
                            const prev=parseFloat(previousValue);
                            const current=parseFloat(currentValue);
                        switch(operation) {
                                case'+':
                                result=prev+current;
                                break;

                                 case'-':
                                result=prev-current;
                                break;
                                
                                 case'*':
                                result=prev*current;
                                break;

                                 case'/':
                                result=prev/current;
                                break;

                                 case'^':
                                result=Math.pow(prev,current);
                                break;
                            }
                            display.value=result;
                            previousValue=result.toString();
                            currentValue='';
                            operation='';
                        }
                    }
                    function SquareRoot(){
                        if(currentValue !==''){
                        const result=Math.pow(parseFloat(currentValue),2);
                        display.value=result;
                        currentValue=result.toString();
                        }
                    }
                    </script>
                    </body>
                    </html>
